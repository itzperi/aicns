<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AICNS 2026 - International Conference</title>
    <meta name="description" content="First International Conference on Artificial Intelligence, Computation and Network Security – 2026" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #2563eb;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #1d4ed8;
      }
      
      /* Marquee Animations */
      @keyframes marquee {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
      }
      .animate-marquee {
        animation: marquee 20s linear infinite;
      }
      
      @keyframes marquee-reverse {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(0%); }
      }
      .animate-marquee-reverse {
        animation: marquee-reverse 20s linear infinite;
      }
      
      /* Utility for pausing marquee on hover */
      .pause-on-hover:hover {
        animation-play-state: paused;
      }
      
      /* Writing mode for vertical text */
      .writing-vertical-lr {
        writing-mode: vertical-lr;
      }
    </style>
    <script type="module" src="/index.tsx"></script>
</head>
  <body class="bg-gray-50 text-gray-800 antialiased">
    <div id="root"></div>
  </body>
</html>
